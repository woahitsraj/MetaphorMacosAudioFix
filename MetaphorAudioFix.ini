; MetaphorAudioFix
; First-pass audio prototype for Metaphor: ReFantazio.
;
; Drop this file next to MetaphorAudioFix.asi.
; If the hook fires, the log will show the requested channel count and
; whether the mastering voice was forced to stereo.

[XAudio2]
Enabled = true
ForceStereoMasteringVoice = false
OverrideExplicitMultichannelVoices = false

[WASAPI]
Enabled = true
ForceStereoMixFormat = false
ForceStereoIsFormatSupported = false
ForceStereoInitialize = false
DisableSpatialAudioClient = false
RejectMultichannelIsFormatSupported = false
RejectMultichannelInitialize = false

[Spatial]
WrapperEnabled = true

[Bootstrap]
ModulePollTimeoutMs = 120000
ModulePollIntervalMs = 250

[Logging]
Verbose = true
